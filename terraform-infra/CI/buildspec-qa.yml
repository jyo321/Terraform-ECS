version: 0.2

phases:

  install:
    commands:
      - curl -O https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
      - unzip terraform_1.6.6_linux_amd64.zip
      - mv terraform /usr/local/bin/

  pre_build:
    commands:
      - cd terraform-infra/terraform-qa
      - terraform init
      - terraform workspace select qa || terraform workspace new qa

  build:
    commands:
      - terraform fmt -check
      - terraform validate
      - terraform plan -out=tfplan

  post_build:
    commands:
      - terraform apply -auto-approve tfplan